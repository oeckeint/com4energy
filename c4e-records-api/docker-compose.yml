services:
  records-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: records-api
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST_DOCKER:-database}
      DB_URL_SGE: ${DB_URL_SGE_DOCKER:-jdbc:mysql://database:3306/sge}
      RABBITMQ_HOST: ${RABBITMQ_HOST_DOCKER:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8082:8082"
    networks:
      - com4energy-net
    restart: unless-stopped

networks:
  com4energy-net:
    external: true
    name: com4energy-net

