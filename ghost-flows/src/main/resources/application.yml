spring:
  application:
    name: jobs
  quartz:
    auto-startup: true
    job-store-type: memory
  datasource:
    url: ${DB_URL_SGE}
    username: ${DB_USER_SGE}
    password: ${DB_PASSWORD_SGE}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # Arranca sin abrir conexión: el job se conecta bajo demanda y el boot no
      # depende de que la BD esté disponible.
      initialization-fail-timeout: -1

server:
  port: 8084

mysql:
  host: ${DB_HOST}
  database: ${SGE_LOCAL_DB_NAME}
  username: ${DB_USER_SGE}
  backup:
    path: /app/database/backups
    # Tablas de medidas excluidas del backup por ser muy pesadas (su esquema lo
    # recrea db-migrations). Quitar de aquí para volver a incluirlas.
    ignored-tables: medida_h,medida_qh,medida_h_legacy,medida_qh_legacy,medida_cch_legacy

---
spring:
  config:
    activate:
      on-profile: dev

mysql:
  backup:
    path: ${DATABASE_BACKUP_PATH}