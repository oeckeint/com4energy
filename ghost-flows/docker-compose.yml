name: com4energy

services:
  com4energy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: com4energy-ghost-flows
    env_file:
      - .env
    volumes:
      # /root/.my.cnf lo genera el entrypoint desde el entorno (ya no se monta)
      - ${DATABASE_BACKUP_PATH}:/app/database/backups
    ports:
      - "${C4E_GHOST_FLOWS_PORT:?C4E_GHOST_FLOWS_PORT is required}:8084"
    networks:
      - com4energy-net
    restart: always

networks:
  com4energy-net:
    external: true
    name: com4energy-net
