<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Medida Horaria</h1>

  <div class="measure-h-top-layout">
    <div class="measure-h-top-left measure-h-filters-card">
      <div class="measure-h-top-filters">
        <app-measure-filters
            [containerClass]="'mb-0 h-100 measure-filters-container-card'"
          [splitFieldsIntoCards]="false"
          [layoutMode]="'top-split'"
          [showActionButtons]="true"
          [searchDisabled]="!hasPendingSearchChanges"
          [clearDisabled]="!hasActiveFilters"
          [calendarSyncToken]="calendarSyncToken"
          [day]="filters.day"
          (dayChange)="onDayChange($event)"
          [clientIdsText]="filters.clientIdsText"
          (clientIdsTextChange)="filters.clientIdsText = $event"
          [selectedTarifa]="filters.selectedTarifa"
          (selectedTarifaChange)="onTarifaChange($event)"
          [tarifasDisponibles]="service.tarifas()"
          [loading]="service.loading()"
          [helperText]="'Opcional. Separar IDs por coma (ej: 3366,3367). Sin filtro: muestra todos los clientes.'"
          (searchRequested)="applyFilters()"
          (clearRequested)="clearFilters()"
          (clientPillRemoved)="applyFilters()"
        />
      </div>
    </div>

    <div class="measure-h-top-right measure-h-widgets-grid">
      <div class="measure-h-top-widget">
        <app-measure-completeness-gauge
          [clientIds]="service.clientIds()"
          [columnValidation]="service.columnValidation()"
          (openAuditorRequested)="openAuditorDefectuosos()"
        />
      </div>

      <div class="measure-h-top-widget">
        <app-measure-hourly-mini-chart
          [rows]="service.rows()"
          [chartYMax]="2500"
          [columnValidation]="service.columnValidation()"
          [clientIds]="service.clientIds()"
          [hasData]="service.totalRecords() > 0"
          [currentDate]="filters.day"
          [showEmptyStateWhenNoData]="true"
          [emptyStateIcon]="'📊'"
          [emptyStateTitle]="'Sin datos para graficar'"
          [emptyStateDescription]="'Selecciona un cliente o rango de fechas con mediciones.'"
          (dayChange)="onDayChange($event)"
        />
      </div>
    </div>

  </div>

  <div class="measure-h-tools-rail" aria-label="Barra de herramientas">
    <button
      type="button"
      class="measure-h-tools-button"
      [class.measure-h-tools-button--active]="activeTool === 'auditor'"
      (click)="toggleTool('auditor')"
      [attr.aria-expanded]="activeTool === 'auditor'"
      aria-controls="medida-h-tools-drawer"
      aria-label="Abrir panel de estado de clientes"
      title="Estado de clientes"
    >
      &#9881;
    </button>

    <button
      type="button"
      class="measure-h-tools-button"
      [class.measure-h-tools-button--active]="activeTool === 'utilidades'"
      (click)="toggleTool('utilidades')"
      [attr.aria-expanded]="activeTool === 'utilidades'"
      aria-controls="medida-h-tools-drawer"
      aria-label="Abrir panel de utilidades"
      title="Utilidades"
    >
      &#9883;
    </button>
  </div>

  <button
    type="button"
    class="measure-h-tools-backdrop"
    [class.measure-h-tools-backdrop--open]="toolsPanelOpen"
    (click)="closeToolsPanel()"
    aria-label="Cerrar panel de herramientas"
  ></button>

  <aside
    id="medida-h-tools-drawer"
    class="measure-h-tools-drawer"
    [class.measure-h-tools-drawer--open]="toolsPanelOpen"
    aria-label="Panel de herramientas"
  >
    <div class="measure-h-tools-header">
      <strong>{{ activeToolTitle }}</strong>
      <button type="button" class="measure-h-tools-close" (click)="closeToolsPanel()" title="Cerrar panel">&times;</button>
    </div>
    <div class="measure-h-tools-body">
      @if (activeTool === 'auditor') {
        <div
          class="measure-h-tools-stack"
          [class.measure-h-tools-stack--scrolling]="showStackScrollbar"
          (scroll)="onToolsStackScroll()"
        >
          <app-measure-auditor-panel
            [clientIds]="service.clientIds()"
            [columnValidation]="service.columnValidation()"
            [currentDate]="filters.day"
            [focusDefectuososTrigger]="auditorFocusTrigger"
          />

          <section class="measure-h-tools-placeholder-card" aria-label="Proximo modulo">
            <div class="measure-h-tools-placeholder-card-title">Proximo modulo</div>
            <div class="measure-h-tools-placeholder-card-text">Aqui puedes agregar otro card del sidebar sin afectar el estado de clientes.</div>
          </section>
        </div>
      } @else {
        <div class="measure-h-tools-placeholder">Aqui iremos agregando mas herramientas.</div>
      }
    </div>
  </aside>

  @if (service.error()) {
    <div class="alert alert-danger">{{ service.error() }}</div>
  }

  <app-measure-matrix-table
    class="measure-h-matrix-block"
    [rows]="service.rows()"
    [clientIds]="service.clientIds()"
    [hasData]="service.totalRecords() > 0"
    [columnValidation]="service.columnValidation()"
    [loading]="service.loading()"
    [emptyStateTitle]="'No hay datos disponibles'"
    [emptyStateDescription]="'No se encontraron mediciones para el rango de fechas y cliente seleccionados. Intenta cambiar los filtros o navegar a otro periodo.'"
    [showDateNavigator]="true"
    [headerDate]="filters.day"
    [cellOriginFetcher]="cellOriginFetcher"
    (headerPreviousDayRequested)="shiftTableDay(-1)"
    (headerNextDayRequested)="shiftTableDay(1)"
    (headerDateSelected)="onTableDateSelected($event)"
    (headerDateFocusRequested)="focusCalendarOnCurrentTableDay()"
    (refreshRequested)="applyFilters()"
    (activeFilterRemoved)="onActiveFilterRemoved($event)"
    [statusText]="statusLabel"
    [statusWarning]="statusHasDiscrepancy"
    [activeFilterPills]="activeFilterPills"
    [expectedFallback]="24"
    [clientColumnMinWidth]="140"
    [exportMeasureType]="'Medida H'"
    [exportDate]="filters.day"
    [exportClientFilterText]="filters.clientIdsText"
  />
</div>
