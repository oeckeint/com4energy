<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Medida CCH</h1>

  <div class="measure-split-layout mb-4">
    <div class="measure-split-left">
      <app-measure-filters
        [day]="filters.day"
        (dayChange)="onDayChange($event)"
        [clientIdsText]="filters.clientIdsText"
        (clientIdsTextChange)="filters.clientIdsText = $event"
        [loading]="service.loading()"
        [helperText]="'Separar IDs por coma.'"
        (search)="applyFilters()"
        (clear)="clearFilters()"
      />
    </div>

    <div class="measure-split-middle">
      <div class="measure-split-chart-wrap">
        <app-measure-completeness-gauge
          [clientIds]="service.clientIds()"
          [columnValidation]="service.columnValidation()"
        />
        <app-measure-hourly-mini-chart
          [rows]="service.rows()"
          [chartYMax]="2500"
          [columnValidation]="service.columnValidation()"
          [clientIds]="service.clientIds()"
          [currentDate]="filters.day"
          (dayChange)="onDayChange($event)"
        />
      </div>
    </div>

    <div class="measure-split-right">
      <app-measure-auditor-panel
        [clientIds]="service.clientIds()"
        [columnValidation]="service.columnValidation()"
        [currentDate]="filters.day"
      />
    </div>
  </div>

  @if (service.error()) {
    <div class="alert alert-danger">{{ service.error() }}</div>
  }

  @if (service.loading()) {
    <div class="d-flex align-items-center gap-2 mb-3">
      <div class="spinner-border spinner-border-sm" role="status"></div>
      <span>Cargando medida CCH...</span>
    </div>
  }

  <app-measure-matrix-table
    [rows]="service.rows()"
    [clientIds]="service.clientIds()"
    [columnValidation]="service.columnValidation()"
    [loading]="service.loading()"
    [expectedFallback]="24"
    [clientColumnMinWidth]="180"
  />
</div>
