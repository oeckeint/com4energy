<header style="padding:12px 16px; border-bottom:1px solid #eee; background:#fff; position: sticky; top: 0; z-index: 100">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:20px">
    <div style="display:flex; align-items:center; gap:8px">
      <div style="background:#1976d2; color:white; width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold">C4E</div>
      <h1 style="margin:0;font-size:18px; white-space: nowrap">Dashboard — <span style="font-weight:600">Medida QH</span></h1>
    </div>

    <!-- Nueva Barra de Navegación con Dropdowns -->
    <nav style="display:flex; gap:12px; align-items:center">
      <!-- Dropdown Vistas -->
      <div class="dropdown">
        <button class="nav-link" (click)="showVistasDropdown.set(!showVistasDropdown()); showArchivosDropdown.set(false)">
          <span>Vistas</span>
          <span class="caret"></span>
        </button>
        <div class="dropdown-menu" [class.show]="showVistasDropdown()">
          <a class="dropdown-item" href="/metrics">Medida QH</a>
          <a class="dropdown-item">Medidas CCH</a>
          <a class="dropdown-item">Medidas H</a>
        </div>
      </div>

      <!-- Dropdown Archivos -->
      <div class="dropdown">
        <button class="nav-link" (click)="showArchivosDropdown.set(!showArchivosDropdown()); showVistasDropdown.set(false)">
          <span>Archivos</span>
          <span class="caret"></span>
        </button>
        <div class="dropdown-menu" [class.show]="showArchivosDropdown()">
          <a class="dropdown-item">Peajes</a>
          <a class="dropdown-item">Facturas</a>
          <a class="dropdown-item">Otras Facturas</a>
        </div>
      </div>
    </nav>

    <!-- Buscador e Info de Cliente -->
    <div style="margin-left:auto;display:flex;gap:12px;align-items:center">
      <div style="display:flex; align-items:center; gap:8px; background:#f8f9fa; padding:4px 12px; border-radius:20px; border:1px solid #eee">
        <span style="font-size:13px; color:#666; font-weight:500">Cliente:</span>
        <span style="font-weight:600;font-size:15px;color:#000">{{ measurementsService.currentClientId() ?? 'Todos' }}</span>
      </div>

      <div style="display:flex; gap:4px">
        <input #clientIdInput [value]="'3215'" placeholder="ID cliente" style="padding:6px 12px;border:1px solid #ddd;border-radius:20px;width:100px; font-size:13px" />
        <button (click)="selectClient(clientIdInput.value)" style="padding:6px 14px;border-radius:20px;border:none;background:#1976d2;color:#fff; font-size:13px; font-weight:500; cursor:pointer">Ver</button>
      </div>
    </div>
  </div>

  <!-- Segunda fila: Controles de Tiempo (Opcional, se puede mover o mantener aquí) -->
  <div style="max-width:1200px;margin:8px auto 0;display:flex;align-items:center;gap:12px; padding-top:8px; border-top:1px solid #f5f5f5">
    <div style="display:flex; gap:8px; align-items:center; margin-left:auto">
      <input #startDate type="datetime-local" style="padding:5px 10px;border:1px solid #ddd;border-radius:6px; font-size:12px" />
      <input #endDate type="datetime-local" style="padding:5px 10px;border:1px solid #ddd;border-radius:6px; font-size:12px" />
      <button (click)="applyRange(startDate.value,endDate.value)" style="padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#444; font-size:12px; font-weight:500; cursor:pointer">Aplicar rango</button>
      <button (click)="loadLast24()" style="padding:5px 12px;border-radius:6px;border:none;background:#1976d2;color:#fff; font-size:12px; font-weight:500; cursor:pointer">Últimas 24h</button>
    </div>
  </div>
</header>

<main style="padding:16px;max-width:1100px;margin:0 auto">
  <router-outlet></router-outlet>
</main>
