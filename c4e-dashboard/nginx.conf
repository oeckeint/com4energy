server {
  listen 80;
  server_name _;

  client_max_body_size 500m;

  root /usr/share/nginx/html;
  index index.html;

  # API -> records-api
  location /api/v1/ {
    proxy_pass http://records-api:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Files API -> ingestion-service (same rewrite used in proxy.conf.json)
  # NOTE: no trailing slash so it matches /api/v1/files and /api/v1/files/*
  location /api/v1/files {
    rewrite ^/api/v1/(.*)$ /$1 break;
    proxy_pass http://ingestion-service:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_request_buffering off;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
